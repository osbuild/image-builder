image_types:
  wsl:
    filename: "image.wsl"
    mime_type: "application/x-tar"
    image_func: "tar"
    exports: ["xz"]
    compression: "xz"
    platforms:
      - arch: "x86_64"
      - arch: "aarch64"
    image_config:
      no_selinux: true
      wsl:
        config:
          boot_systemd: true
        distribution_config:
          shortcut:
            enabled: true
            icon: /usr/share/pixmaps/fedora-logo.ico
          oobe:
            default_name: Fedora-ELN-%s
            default_uid: 1000
    package_sets:
      os:
        - include:
            - "alternatives"
            - "audit-libs"
            - "bash"
            - "ca-certificates"
            - "coreutils-single"
            - "crypto-policies-scripts"
            - "curl-minimal"
            - "dejavu-sans-fonts"
            - "dnf5"
            - "fedora-eln-logos"
            - "fedora-eln-release"
            - "filesystem"
            - "findutils"
            - "gdb-gdbserver"
            # Differs from official UBI, as we don't include CRB repos
            # - "gdbm"
            - "glibc-minimal-langpack"
            - "gmp"
            - "gnupg2"
            - "gobject-introspection"
            - "hostname"
            - "langpacks-en"
            - "libcurl-minimal"
            - "openssh-server"
            - "openssl"
            - "pam"
            - "passwd"
            - "procps-ng"
            - "python3"
            - "python3-inotify"
            - "rootfiles"
            - "rpm"
            - "sed"
            - "setup"
            - "shadow-utils"
            - "sudo"
            - "systemd"
            - "tar"
            - "tpm2-tss"
            - "tzdata"
            - "util-linux"
            - "vim-minimal"
            - "wsl-setup"
          exclude:
            - "gawk-all-langpacks"
            - "glibc-gconv-extra"
            - "glibc-langpack-en"
            - "openssl-pkcs11"
            - "python-unversioned-command"
            # - "redhat-release-eula"
            - "rpm-plugin-systemd-inhibit"
    blueprint:
      supported_options:
        - "distro"
        - "packages"
        - "modules"
        - "groups"
        - "enabled_modules"
        - "containers"
        - "customizations.cacerts"
        - "customizations.dnf"
        - "customizations.directories"
        - "customizations.files"
        - "customizations.firewall"
        - "customizations.firstboot"
        - "customizations.user"
        - "customizations.sshkey"
        - "customizations.group"
        - "customizations.hostname"
        - "customizations.locale"
        - "customizations.repositories"
        - "customizations.services"
        - "customizations.timezone"
        - "customizations.rhsm"
